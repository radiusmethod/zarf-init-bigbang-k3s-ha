name: Publish Zarf Init Package On Tag

on:
  push:
    branches: [ 'main' ]

env:
  # renovate: depName=zarf-dev/zarf
  ZARF_VERSION: 0.59.0

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        flavor: [ full, minimal ]

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: "Login to GHCR"
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Install tools
        uses: ./.github/actions/install-tools

      - name: Build image
        uses: ./.github/actions/build-image
        env:
          REGISTRY1_USERNAME: ${{ secrets.REGISTRY1_USERNAME }}
          REGISTRY1_PASSWORD: ${{ secrets.REGISTRY1_PASSWORD }}
        with:
          flavor: ${{ matrix.flavor }}

      - name: ☁️ Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: arn:aws:iam::540894334194:role/github-actions/gh-ci-zarf-init-bigbang-k3s-ha
          aws-region: us-east-1

      - name: "Sign and Publish the ${{ matrix.flavor }} image"
        run: |
          zarf package publish build/zarf-init-${{ matrix.flavor }}-amd64-v${ZARF_VERSION}.tar.zst oci://ghcr.io/radiusmethod/zarf-init-bigbang-k3s-ha --signing-key awskms:///alias/zarf-init-bigbang
